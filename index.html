<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belinay 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff9ab5, #ffc3d9);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

/* SOL ÜST YAZI */
.badge {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(255,255,255,0.3);
  color: white;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 12px;
  backdrop-filter: blur(10px);
}

/* KART */
.card {
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  color: white;
  backdrop-filter: blur(10px);
}

input, button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 100%;
}

button {
  background: #ff4f8b;
  color: white;
}

/* İÇERİK */
#icerik { display: none; }

.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- SOL ÜST -->
<div class="badge">
  Oktay tarafından Belinay’a yapılmış bir hediyedir doğum günün kutlu olsun nice mutlu senelere 💖
</div>

<!-- GİRİŞ -->
<div class="card" id="giris">
  <h2>💖 Senin için bir sürpriz umarım beğenirsin 💖</h2>

  <input type="text" id="kullanici" placeholder="Kullanıcı adı">
  <input type="password" id="sifre" placeholder="Şifre">

  <button onclick="kontrol()">Giriş</button>
</div>

<!-- İÇERİK -->
<div class="card" id="icerik">
  <h2>📸 Anılarımız</h2>

  <input type="file" accept="image/*" multiple onchange="fotoEkle(event)">
  
  <div class="gallery" id="galeri"></div>

  <button onclick="cikis()">Çıkış Yap</button>
</div>

<script>
let galeri = document.getElementById("galeri");

// FOTOĞRAFLARI YÜKLE
window.onload = function() {
  let kayitli = JSON.parse(localStorage.getItem("fotolar")) || [];
  kayitli.forEach(src => ekranaEkle(src));
}

// GİRİŞ KONTROL
function kontrol() {
  let kullanici = document.getElementById("kullanici").value;
  let sifre = document.getElementById("sifre").value;

  if (kullanici === "Belinay Altın" && sifre === "belinay123") {
    giris.style.display = "none";
    icerik.style.display = "block";
  } else {
    alert("Kullanıcı adı veya şifre yanlış!");
  }
}

// ÇIKIŞ
function cikis() {
  giris.style.display = "block";
  icerik.style.display = "none";
}

// FOTO EKLE (kalıcı)
function fotoEkle(event) {
  let files = event.target.files;
  let kayitli = JSON.parse(localStorage.getItem("fotolar")) || [];

  for (let i = 0; i < files.length; i++) {
    let reader = new FileReader();

    reader.onload = function(e) {
      let src = e.target.result;

      kayitli.push(src);
      localStorage.setItem("fotolar", JSON.stringify(kayitli));

      ekranaEkle(src);
    };

    reader.readAsDataURL(files[i]);
  }
}

// EKRANA BAS
function ekranaEkle(src) {
  let img = document.createElement("img");
  img.src = src;
  galeri.appendChild(img);
}
</script>

</body>
</html>
