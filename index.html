 <!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belinay 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #ff9ab5, #ffc3d9);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

#tanitim {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000000dd;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  z-index: 999;
}

.card {
  background: rgba(255,255,255,0.2);
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  color: white;
  backdrop-filter: blur(10px);
}

button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 100%;
  background: #ff4f8b;
  color: white;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
}

#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000ee;
  display: none;
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 80%;
}

.arrow {
  position: absolute;
  top: 50%;
  font-size: 40px;
  color: white;
  cursor: pointer;
}

.left { left: 20px; }
.right { right: 20px; }

#icerik, #quizAlan { display: none; }
iframe { display: none; }
</style>
</head>

<body>

<div id="tanitim">
  <div>
    <h2>💖 Hoşgeldin Belinay 💖</h2>
    <button onclick="basla()">Başla</button>
  </div>
</div>

<!-- YOUTUBE MÜZİK -->
<iframe id="ytMuzik"
width="0"
height="0"
src=""
frameborder="0"
allow="autoplay">
</iframe>

<button onclick="muzikKontrol()">🔊 Müzik Aç / Kapat</button>

<div class="card" id="giris">
  <h2>🎉 Doğum günün kutlu olsun 🎉</h2>
  <input type="text" id="kullanici" placeholder="Kullanıcı adı">
  <input type="password" id="sifre" placeholder="Şifre">
  <button onclick="kontrol()">Giriş</button>
</div>

<div class="card" id="icerik">
  <h2>📸 Anılarımız</h2>
  <input type="file" accept="image/*" multiple onchange="fotoEkle(event)">
  <div class="gallery" id="galeri"></div>

  <button onclick="quizAc()">🎮 Quiz Başlat</button>
  <button onclick="cikis()">Çıkış</button>
</div>

<div class="card" id="quizAlan">
  <h3>Demon Slayer karakterini buluyorum 💖</h3>
  <p id="soru"></p>
  <button onclick="cevap('evet')">Evet</button>
  <button onclick="cevap('hayir')">Hayır</button>
</div>

<div id="lightbox">
  <span class="arrow left" onclick="prev()">❮</span>
  <img id="buyukFoto">
  <span class="arrow right" onclick="next()">❯</span>
</div>

<script>
let galeri = document.getElementById("galeri");
let ytMuzik = document.getElementById("ytMuzik");
let muzikAcik = false;

let fotolar = [];
let currentIndex = 0;

function basla() {
  tanitim.style.display = "none";
  muzikKontrol(); // başta otomatik başlat
}

function muzikKontrol() {
  if (muzikAcik) {
    ytMuzik.src = "";
    muzikAcik = false;
  } else {
    ytMuzik.src = "https://www.youtube.com/embed/iws0dywdEs4?autoplay=1&loop=1&playlist=iws0dywdEs4";
    muzikAcik = true;
  }
}

// GİRİŞ
function kontrol() {
  if (kullanici.value === "Belinay Altın" && sifre.value === "belinay123") {
    giris.style.display = "none";
    icerik.style.display = "block";
  } else {
    alert("Hatalı!");
  }
}

// FOTO
function fotoEkle(e) {
  for (let f of e.target.files) {
    let reader = new FileReader();
    reader.onload = function(ev) {
      fotolar.push(ev.target.result);
      ekranaEkle(ev.target.result);
    };
    reader.readAsDataURL(f);
  }
}

function ekranaEkle(src) {
  let img = document.createElement("img");
  img.src = src;
  img.onclick = () => acLightbox(src);
  galeri.appendChild(img);
}

// LIGHTBOX
function acLightbox(src) {
  currentIndex = fotolar.indexOf(src);
  buyukFoto.src = src;
  lightbox.style.display = "flex";
}

function next() {
  currentIndex = (currentIndex + 1) % fotolar.length;
  buyukFoto.src = fotolar[currentIndex];
}

function prev() {
  currentIndex = (currentIndex - 1 + fotolar.length) % fotolar.length;
  buyukFoto.src = fotolar[currentIndex];
}

lightbox.onclick = (e) => {
  if (e.target === lightbox) lightbox.style.display = "none";
};

// QUIZ
let adim = 0;

let sorular = [
  "Kadın mı?",
  "Renkli saçlı mı?",
  "Neşeli mi?",
  "Soğukkanlı mı?",
  "Güçlü mü?"
];

let karakterler = {
  "Mitsuri": 0,
  "Shinobu": 0,
  "Rengoku": 0,
  "Giyu": 0
};

function quizAc() {
  icerik.style.display = "none";
  quizAlan.style.display = "block";
  adim = 0;

  for (let k in karakterler) karakterler[k] = 0;

  soru.innerText = sorular[0];
}

function cevap(c) {
  if (adim === 0 && c === "evet") {
    karakterler["Mitsuri"] += 2;
    karakterler["Shinobu"] += 2;
  }

  if (adim === 1 && c === "evet") {
    karakterler["Mitsuri"] += 2;
  }

  if (adim === 2 && c === "evet") {
    karakterler["Mitsuri"] += 1;
    karakterler["Rengoku"] += 2;
  }

  if (adim === 3 && c === "evet") {
    karakterler["Giyu"] += 3;
    karakterler["Shinobu"] += 1;
  }

  if (adim === 4 && c === "evet") {
    karakterler["Rengoku"] += 3;
    karakterler["Giyu"] += 2;
  }

  adim++;

  if (adim < sorular.length) {
    soru.innerText = sorular[adim];
  } else {
    tahmin();
  }
}

function tahmin() {
  let en = 0;
  let secilen = "";

  for (let k in karakterler) {
    if (karakterler[k] > en) {
      en = karakterler[k];
      secilen = k;
    }
  }

  alert("Tahminim: " + secilen + " 💖");

  quizAlan.style.display = "none";
  icerik.style.display = "block";
}

// ÇIKIŞ
function cikis() {
  location.reload();
}
</script>

</body>
</html>
