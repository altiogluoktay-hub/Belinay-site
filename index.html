<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belinay 💖</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff9ab5,#ffc3d9);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-bottom:60px;}
.card {background:rgba(255,255,255,0.15);padding:20px;border-radius:20px;width:90%;max-width:450px;text-align:center;color:white;backdrop-filter:blur(10px);margin:20px auto;box-shadow:0 4px 15px rgba(0,0,0,0.2);transition:0.3s;}
.card:hover {transform:translateY(-5px);box-shadow:0 10px 25px rgba(0,0,0,0.3);}
button {margin-top:10px;padding:10px;border-radius:12px;border:none;width:100%;background:#ff4f8b;color:white;cursor:pointer;transition:0.3s;}
button:hover{background:#ff2a70;transform:scale(1.05);}
#profilKart img{width:130px;height:130px;border-radius:50%;cursor:pointer;margin-bottom:10px;}
.gallery{display:flex;flex-direction:column;gap:10px;margin-bottom:15px;}
.gallery img{width:100%;border-radius:12px;cursor:pointer;}
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000ee;display:none;justify-content:center;align-items:center;}
#lightbox img{max-width:90%;max-height:80%;}
footer{text-align:center;padding:15px;background:rgba(255,255,255,0.2);color:white;position:fixed;bottom:0;width:100%;}
#icerik,#profilKart,#quizAlan,#arkadasAlan,#sonucKart{display:none;}
</style>
</head>

<body>

<div id="tanitim" class="card">
<h2>💖 Hoşgeldin Belinay 💖</h2>
</div>

<div class="card" id="giris">
<h2>🎉 Doğum günün kutlu olsun 🎉</h2>
<input id="kullanici" placeholder="Kullanıcı adı">
<input id="sifre" type="password" placeholder="Şifre">
<button onclick="kontrol()">Giriş</button>
</div>

<div class="card" id="profilKart">
<h3>👤 Profil</h3>
<img id="profilFoto">
<p><b>Belinay Altın</b></p>
<p>05.02.2011</p>
<input type="file" id="profilSec">
<button onclick="profilKaydet()">Kaydet</button>
</div>

<div class="card" id="icerik">
<h2>📸 Anılarımız 💖</h2>
<div class="gallery" id="galeri"></div>
<input type="file" multiple onchange="fotoEkle(event)">
<button onclick="cikis()">Çıkış</button>
</div>

<div id="lightbox">
<img id="buyukFoto">
</div>

<footer>Belinay için hazırlandı 💖</footer>

<script>

// 🔥 PROFİL FOTO (SENİN FOTO)
let varsayilanProfil="https://i.ibb.co/n8tTCLx1/1.jpg";

let profilFoto=document.getElementById("profilFoto");
let galeri=document.getElementById("galeri");

// 🔥 SİLİNMEZ FOTOĞRAFLAR
let sabitFotolar=[
"https://i.postimg.cc/5tL9NShp/foto1.jpg",
"https://i.postimg.cc/3N8LMR3S/foto2.jpg",

"https://i.ibb.co/Pfvg7qn/1.jpg",
"https://i.ibb.co/5xJpT9pd/2.jpg",
"https://i.ibb.co/q3FsRZJW/3.jpg",
"https://i.ibb.co/1GZ09TZP/4.jpg",
"https://i.ibb.co/7tcJG5Vz/5.jpg"
];

let fotolar=[];

// 🚀 SAYFA AÇILINCA
window.onload=function(){

let kayit=localStorage.getItem("profilFoto");
if(kayit){
profilFoto.src=kayit;
}else{
profilFoto.src=varsayilanProfil;
localStorage.setItem("profilFoto",varsayilanProfil);
}

let kayitli=JSON.parse(localStorage.getItem("galeri"))||[];
fotolar=[...sabitFotolar,...kayitli];

fotolar.forEach(f=>ekle(f));

setTimeout(()=>{
tanitim.style.display="none";
giris.style.display="block";
},2000);
}

// 🔐 GİRİŞ
function kontrol(){
if(kullanici.value==="Belinay Altın" && sifre.value==="belinay123"){
giris.style.display="none";
icerik.style.display="block";
profilKart.style.display="block";
}else alert("Hatalı giriş");
}

// 📸 GALERİ
function ekle(src){
let img=document.createElement("img");
img.src=src;
img.onclick=()=>buyut(src);
galeri.appendChild(img);
}

function fotoEkle(e){
for(let f of e.target.files){
let reader=new FileReader();
reader.onload=function(ev){
let src=ev.target.result;
ekle(src);

let kayit=JSON.parse(localStorage.getItem("galeri"))||[];
kayit.push(src);
localStorage.setItem("galeri",JSON.stringify(kayit));
}
reader.readAsDataURL(f);
}
}

// 🔍 BÜYÜTME
function buyut(src){
buyukFoto.src=src;
lightbox.style.display="flex";
}

lightbox.onclick=()=>lightbox.style.display="none";

// 👤 PROFİL
profilSec.onchange=function(e){
let reader=new FileReader();
reader.onload=(ev)=>profilFoto.src=ev.target.result;
reader.readAsDataURL(e.target.files[0]);
}

function profilKaydet(){
localStorage.setItem("profilFoto",profilFoto.src);
alert("Kaydedildi 💖");
}

function cikis(){location.reload();}

</script>
</body>
</html>
