<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinay Altın 2026 - Master Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --pink: #ff1493; --gold: #ffd700; --dark: #1a000d; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #2b001a 0%, #660033 50%, #2b001a 100%); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 180px; }
        
        #music-box { position: fixed; top: 15px; right: 15px; z-index: 10001; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); padding: 10px 20px; border-radius: 50px; display: flex; align-items: center; gap: 12px; box-shadow: 0 0 15px var(--pink); }
        .music-btn { cursor: pointer; font-size: 1.4em; transition: 0.3s; }

        .card { background: rgba(30, 0, 15, 0.9); backdrop-filter: blur(20px); padding: 25px; border-radius: 30px; width: 90%; max-width: 450px; text-align: center; margin: 20px auto; border: 3px solid var(--pink); display: none; animation: popIn 0.5s ease-out forwards; }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .stars { display: flex; justify-content: center; gap: 8px; margin: 15px 0; font-size: 2.5em; }
        .star { cursor: pointer; color: #444; transition: 0.3s; }
        .star.active { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        button { background: linear-gradient(45deg, var(--pink), var(--gold)); color: #000; border: none; padding: 15px; border-radius: 50px; width: 100%; margin: 8px 0; cursor: pointer; font-weight: 900; font-family: 'Orbitron'; transition: 0.3s; }
        .back-btn { background: transparent !important; color: var(--gold) !important; border: 2px solid var(--gold) !important; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: none; outline: none; box-sizing: border-box; }

        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--pink) 0%, var(--dark) 100%); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #cortisolHUD { position: fixed; bottom: 0; width: 100%; background: rgba(20, 0, 10, 0.95); border-top: 4px solid var(--gold); padding: 10px 0; z-index: 998; text-align: center; }
    </style>
</head>
<body>

<div id="music-box" style="display:none;">
    <span class="music-btn" id="playBtn" onclick="toggleMusic()">▶️</span>
    <div style="display: flex; flex-direction: column;">
        <span style="font-size: 10px; font-family: 'Orbitron'; color: var(--gold);">İYİ Kİ DOĞDUN</span>
        <span style="font-size: 9px; color: white;">BELİNAY ALTIN 🎂</span>
    </div>
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
    </audio>
</div>

<div id="login-screen">
    <div class="card" style="display: block;">
        <h1 style="font-family: 'Orbitron'; color: var(--gold);">B.A. PORTAL</h1>
        <input id="uName" type="text" placeholder="Kullanıcı Adı">
        <input id="uPass" type="password" placeholder="Şifre">
        <button onclick="checkAccess()">GİRİŞ YAP ✨</button>
    </div>
</div>

<div id="mainMenu" class="card">
    <img src="https://i.ibb.co/n8tTCLx1/1.jpg" style="width:100px; height:100px; border-radius:50%; border:4px solid var(--pink);">
    <h2 style="font-family: 'Orbitron'; color: var(--gold);">Belinay Altın</h2>
    <button onclick="show('personality')">👤 YETENEK PANELİ</button>
    <button onclick="show('gallery')">🖼️ ANILAR GALERİSİ</button>
    <button onclick="show('friendQuiz')">🌟 EN İYİ ARKADAŞ?</button>
    <button onclick="startF1()">🏎️ HIZ TUTKUSU OYUNU</button>
    <button onclick="startAnimeQuiz()">🔥 ANİME TESTİ</button>
    <button onclick="show('puanAlan')">⭐ SİTEYİ PUANLA</button>
</div>

<div id="puanAlan" class="card">
    <h2 style="font-family: 'Orbitron'; color: var(--gold);">SİTEYİ PUANLA</h2>
    <div class="stars" id="starContainer">
        <span class="star" onclick="setStar(1)">★</span>
        <span class="star" onclick="setStar(2)">★</span>
        <span class="star" onclick="setStar(3)">★</span>
        <span class="star" onclick="setStar(4)">★</span>
        <span class="star" onclick="setStar(5)">★</span>
    </div>
    <button onclick="saveRating()">PUANI GÖNDER</button>
    <button class="back-btn" onclick="goHome()">ANA MENÜYE DÖN</button>
</div>

<div id="personality" class="card">
    <p><b>🎮 Hobiler:</b> Minecraft, Roblox, MLBB, Anime</p>
    <button class="back-btn" onclick="updateTask('card'); goHome();">ANA MENÜYE DÖN</button>
</div>

<div id="gallery" class="card">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <img src="https://i.ibb.co/n8tTCLx1/1.jpg" style="width:100%; border-radius:10px;">
    </div>
    <button class="back-btn" onclick="updateTask('gal'); goHome();">ANA MENÜYE DÖN</button>
</div>

<div id="friendQuiz" class="card">
    <button onclick="friendWin()">Oktay</button>
    <button class="back-btn" onclick="goHome()">ANA MENÜYE DÖN</button>
</div>

<div id="animeQuiz" class="card">
    <div id="qBox"></div>
    <button onclick="nextQ()">EVET</button>
    <button class="back-btn" onclick="goHome()">ANA MENÜYE DÖN</button>
</div>

<div id="f1Game" class="card">
    <canvas id="f1Canvas" width="300" height="300" style="background:#000; width:100%;"></canvas>
    <button class="back-btn" onclick="f1On = false; goHome();">ANA MENÜYE DÖN</button>
</div>

<div id="cortisolHUD" style="display:none;">
    <div style="font-size:10px; color:var(--gold); font-family:'Orbitron';">CORTISOL SEVİYESİ</div>
    <canvas id="meterCanvas" width="280" height="100"></canvas>
    <div id="stressStatus" style="font-weight:900; color:red;">DURUM: KRİTİK 🚨</div>
</div>

<script>
    let activeTasks = [], angle = 60, f1On = false, score = 0, currentRating = 0;
    const audio = document.getElementById("bgMusic");

    function toggleMusic() {
        if (audio.paused) { audio.play(); document.getElementById("playBtn").innerText = "⏸️"; }
        else { audio.pause(); document.getElementById("playBtn").innerText = "▶️"; }
    }

    function checkAccess() {
        const u = document.getElementById("uName").value.toLowerCase();
        const p = document.getElementById("uPass").value;
        if (u === "belinay" && p === "belinay123") {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("music-box").style.display = "flex";
            document.getElementById("mainMenu").style.display = "block";
            document.getElementById("cortisolHUD").style.display = "block";
            drawMeter();
        } else { alert("Hata!"); }
    }

    function setStar(n) {
        currentRating = n;
        document.querySelectorAll('.star').forEach((s, i) => {
            s.classList.toggle('active', i < n);
        });
    }

    function saveRating() {
        if(currentRating === 0) return alert("Lütfen bir puan seç!");
        alert(currentRating + " Yıldız verdin! Teşekkürler ✨");
        updateTask('puan');
        goHome();
    }

    function updateTask(id) {
        if(!activeTasks.includes(id)) {
            activeTasks.push(id);
            // Cortisol düşüşü kolaylaştırıldı: Her görevde 40 derece düşer
            angle = 60 - (activeTasks.length * 40);
            if(activeTasks.length >= 3) { 
                document.getElementById("stressStatus").innerText = "DURUM: HARİKA 😊"; 
                document.getElementById("stressStatus").style.color = "#00ff88"; 
                angle = -60; 
            }
            drawMeter();
        }
    }

    function drawMeter() {
        const c = document.getElementById("meterCanvas"), ctx = c.getContext("2d");
        ctx.clearRect(0,0,300,100);
        const colors = ["#00ff88", "#f1c40f", "#ff1493"];
        [Math.PI, Math.PI*1.33, Math.PI*1.66].forEach((v, i) => {
            ctx.beginPath(); ctx.arc(140, 90, 60, v, v + Math.PI*0.33);
            ctx.lineWidth = 12; ctx.strokeStyle = colors[i]; ctx.stroke();
        });
        ctx.save(); ctx.translate(140, 90); ctx.rotate(angle * Math.PI / 180);
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-4, -50); ctx.lineTo(4, -50);
        ctx.fillStyle = "white"; ctx.fill(); ctx.restore();
    }

    function show(id) { document.querySelectorAll('.card').forEach(c => c.style.display = 'none'); document.getElementById(id).style.display = 'block'; }
    function goHome() { f1On = false; show("mainMenu"); }
    function friendWin() { alert("Harika! ✨"); updateTask('friend'); goHome(); }
    
    let qIdx = 0; const qs = ["En sevdiğin renk pembe mi?", "Anime sever misin?"];
    function startAnimeQuiz() { qIdx = 0; show('animeQuiz'); nextQ(); }
    function nextQ() { if(qIdx < qs.length) { document.getElementById("qBox").innerText = qs[qIdx++]; } else { updateTask('anime'); goHome(); } }
    function startF1() { show('f1Game'); f1On = true; }
</script>
</body>
</html>
