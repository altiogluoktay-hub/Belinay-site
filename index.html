<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinay Altın - 2026 Özel Doğum Günü Paneli ✨</title>
    <style>
        /* --- GENEL TASARIM VE ANİMASYONLAR --- */
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }

        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradientBG 12s ease infinite;
            color: white; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; padding-bottom: 250px;
        }

        .card {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 30px; width: 90%; max-width: 450px;
            text-align: center; margin: 20px auto; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: fadeIn 0.8s ease;
        }

        h1, h2, h3 { margin: 10px 0; letter-spacing: 1px; }
        
        button {
            background: linear-gradient(135deg, #ff4f8b, #ff1f6b);
            color: white; border: none; padding: 15px; border-radius: 18px;
            width: 100%; margin: 10px 0; cursor: pointer; font-weight: bold;
            font-size: 1.1em; transition: 0.4s; box-shadow: 0 5px 15px rgba(255,79,139,0.4);
        }
        button:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(255,31,107,0.6); }
        .back-btn { background: #444 !important; margin-top: 20px !important; }

        /* --- SES PANELİ --- */
        #volPanel {
            position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8);
            padding: 12px; border-radius: 15px; display: flex; align-items: center;
            gap: 10px; z-index: 2000; border: 1px solid rgba(255,255,255,0.3);
        }
        #volPanel input { width: 80px; cursor: pointer; accent-color: #ff4f8b; }

        /* --- CORTISOL METRE (SABİT ALT PANEL) --- */
        #cortisolFixed {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); border-top: 3px solid #ff4f8b;
            padding: 15px 0; z-index: 3000; display: none; text-align: center;
        }
        .meter-container { display: flex; flex-direction: column; align-items: center; }
        canvas#meterCanvas { width: 280px; height: 120px; }
        .meter-title { font-size: 14px; font-weight: bold; color: #ff4f8b; margin-bottom: 5px; }
        #meterStatus { font-size: 16px; font-weight: bold; margin-top: -10px; }

        /* --- KLAVUZ MODAL --- */
        #klavuzModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97); z-index: 5000; display: none;
            justify-content: center; align-items: center;
        }
        .klavuz-box { border: 2px solid #ffeb3b; animation: pulse 2s infinite; }

        /* --- OYUN: F1 --- */
        #f1Canvas { background: #222; border-radius: 15px; border: 4px solid #ff4f8b; cursor: crosshair; touch-action: none; }
        
        /* --- GALERİ --- */
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 20px 0; }
        .gallery img { width: 100px; height: 100px; object-fit: cover; border-radius: 15px; border: 3px solid white; cursor: pointer; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.1) rotate(3deg); }

        /* --- BİLDİRİM --- */
        #notif {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-150px);
            background: #2ecc71; color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: bold; transition: 0.6s; z-index: 4000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* --- FORM ELEMANLARI --- */
        input, textarea {
            padding: 15px; width: 85%; border-radius: 12px; border: none;
            margin-bottom: 15px; font-size: 1em; background: rgba(255,255,255,0.9);
        }

        /* GİZLİ BÖLÜMLER */
        #icerik, #profilKart, #f1Alan, #quizAlan, #sonucKart, #mektupAlan, #oktayBolumu { display: none; }
    </style>
</head>
<body onload="checkFirstLoad()">

<div id="notif">✨ STRES SEVİYESİ DÜŞTÜ! ✨</div>

<div id="volPanel">
    <span>🔊</span><input type="range" min="0" max="100" value="50" oninput="setVol(this.value)">
</div>

<div id="klavuzModal">
    <div class="card klavuz-box">
        <h2 style="color: #ffeb3b;">🎮 GÖREV TALİMATI</h2>
        <div id="klavuzIcerik" style="font-size: 1.2em; line-height: 1.6; margin: 20px 0;"></div>
        <button onclick="klavuzIlerle()" id="klavuzBtn" style="background: #2ecc71;">DEVAM ET</button>
    </div>
</div>

<div id="giris" class="card">
    <h1 style="font-size: 2.5em;">🎁 Belinay ✨</h1>
    <p>Sana özel hazırlanan 2026 portalına hoş geldin!</p>
    <input id="kullanici" placeholder="Adın Soyadın" value="Belinay Altın">
    <input id="sifre" type="password" placeholder="Şifre" value="belinay123">
    <button onclick="girisYap()">SİSTEME GİRİŞ YAP 🚀</button>
    <p style="font-size: 0.8em; opacity: 0.7;">Şifre: belinay123</p>
</div>

<div id="profilKart" class="card">
    <img src="https://i.ibb.co/n8tTCLx1/1.jpg" style="width:120px; height:120px; border-radius:50%; border:5px solid white; object-fit: cover;">
    <h2>Belinay Altın</h2>
    <p>Doğum Günü: 05.02.2011 | Yaş: 15</p>
</div>

<div id="icerik" class="card">
    <h3>ANA GÖREVLER</h3>
    <button onclick="oktayAc()">🌟 En Sevdiğin Arkadaşın Kim?</button>
    <button onclick="f1Baslat()">🏎️ Mini F1 Yarışı (Stres Atma)</button>
    <button onclick="quizAc()">🔥 En Sevdiğin Karakteri Bulalım</button>
    <button onclick="mektupAc()">📩 2027 Geleceğe Mesaj Gönder</button>
    
    <div class="gallery">
        <img src="https://i.postimg.cc/5tL9NShp/foto1.jpg" title="Harika Bir Gün">
        <img src="https://i.postimg.cc/3N8LMR3S/foto2.jpg" title="Mutluluk">
    </div>
    
    <button onclick="location.reload()" style="background:#222; margin-top:30px; font-size: 0.8em;">GÜVENLİ ÇIKIŞ</button>
</div>

<div id="oktayBolumu" class="card">
    <h2>Dürüstlük Testi! 🤔</h2>
    <p>En sevdiğin, en kafa dengi arkadaşın kim?</p>
    <div id="oktayButonlar">
        <button onclick="oktayTamam()">Oktay</button>
        <button onclick="oktayTamam()">Kesinlikle Oktay</button>
    </div>
    <div id="oktayYanit" style="display:none; color: #2ecc71; font-weight: bold; font-size: 1.4em; padding: 20px;">
