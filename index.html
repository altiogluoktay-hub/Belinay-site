<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belinay'ın Dünyası 💖</title>
<style>
/* --- GENEL VE ANİMASYON --- */
@keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
body {
    margin:0; font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(-45deg, #ff7eb3, #ff758c, #8e44ad, #2c3e50);
    background-size: 400% 400%; animation: gradientBG 10s ease infinite;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; color: white; padding-bottom: 80px;
}
.card {
    background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
    padding: 20px; border-radius: 20px; width: 90%; max-width: 400px;
    text-align: center; margin: 15px auto; border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
button {
    background: #ff4f8b; color: white; border: none; padding: 12px;
    border-radius: 12px; width: 100%; margin: 6px 0; cursor: pointer; font-weight: bold; transition: 0.3s;
}
button:hover { transform: scale(1.02); background: #ff1f6b; }

/* --- SES PANELİ --- */
#volPanel { position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; z-index: 2000; }
#volPanel input { width: 70px; cursor: pointer; }

/* --- EN SEVİLEN ARKADAŞ BÖLÜMÜ --- */
#oktayBölümü { display: none; }
.cevap-btn { background: #6c5ce7; font-size: 1.1em; }

/* --- GALERİ & LIGHTBOX --- */
.gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 10px; }
.gallery img { width: 75px; height: 75px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 2px solid white; }
#lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
#lightbox img { max-width: 85%; max-height: 75%; border-radius: 10px; border: 3px solid white; }

/* --- F1 YARIŞI --- */
#f1Canvas { background: #444; border-radius: 10px; border: 3px solid #ff4f8b; width: 100%; max-width: 300px; display: block; margin: 0 auto; }

footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.5); padding: 15px; text-align: center; backdrop-filter: blur(5px); z-index: 100; font-size: 14px; }
#icerik, #profilKart, #f1Alan, #quizAlan, #sonucKart, #ratingAlan, #oktayBölümü { display: none; }
</style>
</head>
<body>

<div id="volPanel">
    <span>🔊</span>
    <input type="range" min="0" max="100" value="50" oninput="changeVol(this.value)">
    <span id="volVal">50%</span>
</div>

<div id="giris" class="card">
    <h2>🎁 Belinay'ın Dünyası</h2>
    <input id="kullanici" placeholder="Adın Soyadın" style="padding:10px; width:85%; border-radius:8px; border:none; margin-bottom:10px;">
    <input id="sifre" type="password" placeholder="Şifre" style="padding:10px; width:85%; border-radius:8px; border:none;">
    <button onclick="girisYap()">Giriş Yap 🎵</button>
</div>

<div id="profilKart" class="card">
    <img src="https://i.ibb.co/n8tTCLx1/1.jpg" style="width:100px; height:100px; border-radius:50%; border:3px solid white; object-fit: cover;">
    <h3>Belinay Altın</h3>
</div>

<div id="icerik" class="card">
    <h3>Neler Yapalım? ✨</h3>
    <button onclick="oktayAc()">🌟 En Sevdiğin Arkadaşın Kim?</button>
    <button onclick="f1Baslat()">🏎️ Mini F1 Yarışı</button>
    <button onclick="quizAc()">🔥 Karakter Tahmini</button>
    <button onclick="ratingAc()">⭐ Siteyi Puanla</button>
    
    <div class="gallery">
        <img src="https://i.postimg.cc/5tL9NShp/foto1.jpg" onclick="openLB(0)">
        <img src="https://i.postimg.cc/3N8LMR3S/foto2.jpg" onclick="openLB(1)">
    </div>
    <button onclick="location.reload()" style="background:#555; margin-top:15px;">Çıkış Yap</button>
</div>

<div id="oktayBölümü" class="card">
    <h2 style="color: #ffeb3b;">Zor Soru! 🤔</h2>
    <p style="font-size: 1.2em;">En sevdiğin arkadaşın kim?</p>
    <button class="cevap-btn" onclick="oktayMesaj()">Oktay</button>
    <button class="cevap-btn" onclick="oktayMesaj()">Tabii ki Oktay</button>
    <div id="oktaySonuç" style="margin-top:20px; display:none; animation: slideUp 0.5s;">
        <p style="font-size: 1.3em; font-weight: bold;">Çok naziksin, teşekkür ederim! 😊💖</p>
        <button onclick="anaMenu()" style="background:#ff4f8b; margin-top:10px;">Geri Dön</button>
    </div>
</div>

<div id="f1Alan" class="card">
    <h3 id="f1Score">Skor: 0</h3>
    <canvas id="f1Canvas" width="300" height="400"></canvas>
    <button onclick="anaMenu()">Yarışı Bitir</button>
</div>

<div id="quizAlan" class="card">
    <h3 id="soruMetni">Soru Yükleniyor...</h3>
    <button onclick="quizCevap()">Evet</button>
    <button onclick="quizCevap()">Hayır</button>
</div>

<div id="sonucKart" class="card">
    <h2 style="color: #ffeb3b;">🔥 TAHMİNİM: RENGOKU 🔥</h2>
    <img src="https://i.postimg.cc/0jZtgT8T/rengoku.jpg" style="width:100%; border-radius:15px;">
    <button onclick="anaMenu()">Geri Dön</button>
</div>

<div id="ratingAlan" class="card">
    <h3>Puanın? 😍</h3>
    <div id="stars">
        <span onclick="rate(1)">⭐</span><span onclick="rate(2)">⭐</span>
        <span onclick="rate(3)">⭐</span><span onclick="rate(4)">⭐</span><span onclick="rate(5)">⭐</span>
    </div>
    <p id="rateMsg"></p>
    <button onclick="anaMenu()">Geri Dön</button>
</div>

<div id="lightbox">
    <img id="lbImg" src="">
    <span onclick="this.parentElement.style.display='none'" style="position:absolute; top:20px; right:30px; font-size:40px; cursor:pointer;">×</span>
</div>

<iframe id="muzikPlayer" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>
<footer>Belinay'a doğum günü için yapılmıştır. 💖</footer>

<script>
// --- SES ---
function changeVol(v) {
    document.getElementById("volVal").innerText = v + "%";
    document.getElementById("muzikPlayer").contentWindow.postMessage('{"event":"command","func":"setVolume","args":['+v+']}', '*');
}

// --- GİRİŞ ---
function girisYap() {
    let k = document.getElementById("kullanici").value, s = document
