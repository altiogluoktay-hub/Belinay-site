<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinay Altın Özel Portalı 2026-2027 ✨</title>
    <style>
        /* --- ANA TEMA VE ANİMASYONLAR --- */
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }
        
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            color: white; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; padding-bottom: 250px;
        }

        .card {
            background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 30px; width: 90%; max-width: 450px;
            text-align: center; margin: 20px auto; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: fadeIn 0.8s ease;
        }

        h1, h2, h3 { margin: 10px 0; letter-spacing: 1px; }
        
        button {
            background: linear-gradient(135deg, #ff4f8b, #ff1f6b);
            color: white; border: none; padding: 15px; border-radius: 18px;
            width: 100%; margin: 10px 0; cursor: pointer; font-weight: bold;
            font-size: 1.1em; transition: 0.4s; box-shadow: 0 5px 15px rgba(255,79,139,0.3);
        }
        button:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(255,31,107,0.5); }
        .back-btn { background: #444 !important; margin-top: 20px !important; }

        /* --- CORTISOL METRE (SABİT ALT PANEL) --- */
        #cortisolFixed {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.95); border-top: 4px solid #ff4f8b;
            padding: 15px 0; z-index: 3000; display: none; text-align: center;
        }
        .meter-container { display: flex; flex-direction: column; align-items: center; }
        canvas#meterCanvas { width: 280px; height: 120px; }
        .meter-title { font-size: 14px; font-weight: bold; color: #ff4f8b; margin-bottom: 5px; text-transform: uppercase; }
        #meterStatus { font-size: 16px; font-weight: bold; margin-top: -10px; }

        /* --- PUANLAMA YILDIZLARI --- */
        .stars { font-size: 2.5em; margin: 15px 0; display: flex; justify-content: center; gap: 10px; }
        .star { cursor: pointer; color: #444; transition: 0.3s; }
        .star.active { color: #ffeb3b; text-shadow: 0 0 15px #ffeb3b; }

        /* --- KLAVUZ MODAL --- */
        #klavuzModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 5000; display: none;
            justify-content: center; align-items: center;
        }

        /* --- OYUN VE GALERİ --- */
        #f1Canvas { background: #222; border-radius: 20px; border: 4px solid #ff4f8b; touch-action: none; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 20px 0; }
        .gallery img { width: 100px; height: 100px; object-fit: cover; border-radius: 15px; border: 3px solid white; cursor: pointer; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.1); }

        /* --- BİLDİRİM --- */
        #notif {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150px);
            background: #2ecc71; color: white; padding: 15px 35px; border-radius: 50px;
            font-weight: bold; transition: 0.6s; z-index: 4000; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        input, textarea {
            padding: 15px; width: 85%; border-radius: 15px; border: none;
            margin-bottom: 15px; font-size: 1em; background: rgba(255,255,255,0.9); color: #333;
        }

        #volPanel { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 15px; z-index: 2000; border: 1px solid rgba(255,255,255,0.2); }

        /* GİZLİ BÖLÜMLER */
        #icerik, #profilKart, #f1Alan, #quizAlan, #sonucKart, #mektupAlan, #oktayBolumu, #puanAlan { display: none; }
    </style>
</head>
