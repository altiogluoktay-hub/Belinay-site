<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belinay 💖</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ff9ab5,#ffc3d9);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-bottom:60px;}
.card {background:rgba(255,255,255,0.15);padding:20px;border-radius:20px;width:90%;max-width:450px;text-align:center;color:white;backdrop-filter:blur(10px);margin:20px auto;box-shadow:0 4px 15px rgba(0,0,0,0.2);transition:0.3s;}
.card:hover {transform:translateY(-5px);box-shadow:0 10px 25px rgba(0,0,0,0.3);}
button {margin-top:10px;padding:10px;border-radius:12px;border:none;width:100%;background:#ff4f8b;color:white;cursor:pointer;transition:0.3s;}
button:hover{background:#ff2a70;transform:scale(1.05);}
#profilKart img{width:130px;height:130px;border-radius:50%;cursor:pointer;margin-bottom:10px;transition:0.3s;}
#profilKart img:hover{transform:scale(1.1);box-shadow:0 10px 20px rgba(0,0,0,0.5);}
#profilKart input[type=file]{margin-top:10px;padding:8px;border-radius:12px;border:none;width:80%;background:#ff4f8b;color:white;cursor:pointer;transition:0.2s;}
#profilKart input[type=file]:hover{background:#ff2a70;transform:scale(1.05);}
.gallery{display:flex;flex-direction:column;gap:10px;margin-bottom:15px;}
.gallery img{width:100%;border-radius:12px;cursor:pointer;transition:0.3s;}
.gallery img:hover{transform:scale(1.05);}
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000ee;display:none;justify-content:center;align-items:center;}
#lightbox img{max-width:90%;max-height:80%;}
.arrow{position:absolute;top:50%;font-size:40px;color:white;cursor:pointer;}
.left{left:20px;} .right{right:20px;}
footer{text-align:center;padding:15px;background:rgba(255,255,255,0.2);color:white;border-top:1px solid #fff;backdrop-filter:blur(5px);position:fixed;bottom:0;width:100%;}
canvas{display:block;margin:10px auto;background:rgba(255,255,255,0.1);border-radius:15px;}
#sonucKart{animation:fadeIn 1s;}
/* Başlangıçta giriş görünür olacak, diğer alanlar gizli */
#icerik,#profilKart,#quizAlan,#arkadasAlan,#pacmanCard,#flappyCard,#arabaCard,#sonucKart{display:none;}
</style>
</head>
<body>

<!-- Tanıtım -->
<div id="tanitim" class="card">
  <h2>💖 Hoşgeldin Belinay 💖</h2>
</div>

<!-- Müzik -->
<iframe id="ytMuzik" width="0" height="0" src="" frameborder="0" allow="autoplay"></iframe>
<button onclick="muzikKontrol()">🔊 Müzik Aç / Kapat</button>

<!-- Giriş -->
<div class="card" id="giris">
  <h2>🎉 Doğum günün kutlu olsun 🎉</h2>
  <input type="text" id="kullanici" placeholder="Kullanıcı adı">
  <input type="password" id="sifre" placeholder="Şifre">
  <button onclick="kontrol()">Giriş</button>
</div>

<!-- Profil Kartı -->
<div class="card" id="profilKart">
  <h3 style="color:#fff;text-shadow:1px 1px 2px #000;">👤 Profil</h3>
  <img id="profilFoto" src="https://i.postimg.cc/5tL9NShp/foto1.jpg" alt="Profil Foto">
  <p style="color:#fff;font-weight:bold;font-size:18px;text-shadow:1px 1px 2px #000;">Belinay Altın</p>
  <p style="color:#fff;font-size:16px;text-shadow:1px 1px 2px #000;">Doğum Tarihi: 05.02.2011</p>
  <input type="file" accept="image/*" id="profilSec">
  <button onclick="profilKaydet()">💾 Kaydet</button>
</div>

<!-- İçerik -->
<div class="card" id="icerik">
  <h2>📸 Anılarımız 💖</h2>
  <div class="gallery" id="galeri"></div>
  <input type="file" accept="image/*" multiple onchange="fotoEkle(event)">
  <button onclick="quizAc()">🎮 Quiz Başlat</button>
  <button onclick="arkadasAc()">👯 En Sevdiğin Arkadaş</button>
  <button onclick="degerlendirmeAc()">⭐ Siteyi Değerlendir</button>
  <button onclick="pacmanAc()">👾 Mini Pacman</button>
  <button onclick="flappyAc()">🐦 Mini Flappy Bird</button>
  <button onclick="cikis()">Çıkış</button>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <span class="arrow left" onclick="prev()">❮</span>
  <img id="buyukFoto">
  <span class="arrow right" onclick="next()">❯</span>
</div>

<footer>
  Bu web sitesi, Belinay’a ithafen Oktay tarafından hazırlanmıştır. Lütfen Oktay’a nazik ve iyi davranmayı unutmayın 💖
</footer>

<script>
// ---------------- Profiller ve Galeri ----------------
let profilFoto=document.getElementById("profilFoto");
let profilSec=document.getElementById("profilSec");
let galeri=document.getElementById("galeri");
let fotolar=[], sabitFotolar=["https://i.postimg.cc/5tL9NShp/foto1.jpg","https://i.postimg.cc/3N8LMR3S/foto2.jpg"];
let currentIndex=0;

// ---------------- Başlangıç ve Giriş ----------------
window.onload=function(){
  // Profili yükle
  let savedProfile=localStorage.getItem("profilFoto");
  if(savedProfile) profilFoto.src=savedProfile;

  // Galeriyi yükle
  let savedFotos=JSON.parse(localStorage.getItem("galeriFotos"))||[];
  fotolar=[...sabitFotolar,...savedFotos];
  fotolar.forEach(src=>ekranaEkle(src));

  // 2 saniye sonra tanıtım kaybolur, giriş açılır
  setTimeout(()=>{tanitim.style.display="none"; giris.style.display="block";},2000);
}

// Profil fotoğrafı seçme
profilSec.onchange=function(e){
  let file=e.target.files[0];
  if(file){
    let reader=new FileReader();
    reader.onload=function(ev){profilFoto.src=ev.target.result;}
    reader.readAsDataURL(file);
  }
}

// Profil kaydet
function profilKaydet(){
  localStorage.setItem("profilFoto",profilFoto.src);
  alert("Profil fotoğrafı kaydedildi 💖");
}

// Galeriye ekle
function ekranaEkle(src){
  let img=document.createElement("img");
  img.src=src;
  img.onclick=()=>acLightbox(src);
  galeri.appendChild(img);
}

// Foto ekleme
function fotoEkle(e){
  for(let f of e.target.files){
    let reader=new FileReader();
    reader.onload=function(ev){
      let src=ev.target.result;
      fotolar.push(src);
      ekranaEkle(src);
      let kayit=JSON.parse(localStorage.getItem("galeriFotos"))||[];
      kayit.push(src);
      localStorage.setItem("galeriFotos",JSON.stringify(kayit));
    }
    reader.readAsDataURL(f);
  }
}

// ---------------- Lightbox ----------------
function acLightbox(src){currentIndex=fotolar.indexOf(src);buyukFoto.src=src;lightbox.style.display="flex";}
function next(){currentIndex=(currentIndex+1)%fotolar.length;buyukFoto.src=fotolar[currentIndex];}
function prev(){currentIndex=(currentIndex-1+fotolar.length)%fotolar.length;buyukFoto.src=fotolar[currentIndex];}
lightbox.onclick=(e)=>{if(e.target===lightbox) lightbox.style.display="none";}

// ---------------- Müzik ----------------
let muzikAcik=false;
let ytMuzik=document.getElementById("ytMuzik");
function muzikKontrol(){if(muzikAcik){ytMuzik.src="";muzikAcik=false;}else{ytMuzik.src="https://www.youtube.com/embed/iws0dywdEs4?autoplay=1&loop=1&playlist=iws0dywdEs4";muzikAcik=true;}}

// ---------------- Giriş Kontrol ----------------
function kontrol(){
  if(kullanici.value==="Belinay Altın" && sifre.value==="belinay123"){
    giris.style.display="none";
    icerik.style.display="block";
    profilKart.style.display="block";
    muzikKontrol();
  } else alert("Kullanıcı adı veya şifre hatalı!");
}
function basla(){tanitim.style.display="none"; giris.style.display="block";}
function cikis(){location.reload();}
</script>
</body>
</html>
