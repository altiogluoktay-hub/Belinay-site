<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belinay Altın 2026 - Master Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pink: #ff1493; /* Deep Pink */
            --light-pink: #ff69b4; /* Hot Pink */
            --gold: #ffd700; /* Gold */
            --dark: #1a000d;
            --glass: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #2b001a 0%, #660033 50%, #2b001a 100%);
            color: white; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; padding-bottom: 200px;
        }

        /* --- GİRİŞ EKRANI (RENGÂRENK) --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--light-pink) 0%, var(--dark) 100%);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
        }

        .card {
            background: rgba(30, 0, 15, 0.9); backdrop-filter: blur(20px);
            padding: 35px; border-radius: 35px; width: 90%; max-width: 420px;
            text-align: center; margin: 20px auto; border: 3px solid var(--pink);
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.5); display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- KLAVUZ MODAL --- */
        #klavuzModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; display: none;
            justify-content: center; align-items: center; text-align: center;
        }

        /* --- 3D KART --- */
        .flip-container { perspective: 1000px; width: 100%; height: 420px; margin: 20px 0; }
        .flip-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s; transform-style: preserve-3d; cursor: pointer; }
        .flip-container.flipped .flip-inner { transform: rotateY(180deg); }
        .flip-front, .flip-back { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 30px; display: flex; flex-direction: column; justify-content: center; padding: 30px; box-sizing: border-box; 
        }
        .flip-front { background: #1a1a1a; border: 4px solid var(--pink); box-shadow: inset 0 0 20px var(--pink); }
        .flip-back { background: linear-gradient(45deg, var(--pink), var(--gold)); transform: rotateY(180deg); color: #000; }

        /* --- BUTONLAR & INPUTLAR --- */
