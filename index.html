<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belinay 💖</title>

<style>
body {margin:0;font-family:Arial;background:linear-gradient(135deg,#ff9ab5,#ffc3d9);display:flex;flex-direction:column;align-items:center;min-height:100vh;padding-bottom:60px;}
.card {background:rgba(255,255,255,0.15);padding:20px;border-radius:20px;width:90%;max-width:450px;text-align:center;color:white;margin:20px auto;}
button {margin-top:10px;padding:10px;border-radius:12px;border:none;width:100%;background:#ff4f8b;color:white;}
.gallery img{width:100%;border-radius:12px;margin-top:10px;}
#lightbox{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000ee;display:none;justify-content:center;align-items:center;}
#lightbox img{max-width:90%;}
</style>
</head>

<body>

<div id="giris" class="card">
<h2>Giriş</h2>
<input id="kullanici" placeholder="Kullanıcı adı"><br><br>
<input id="sifre" type="password" placeholder="Şifre"><br>
<button onclick="kontrol()">Giriş</button>
</div>

<div id="profilKart" class="card" style="display:none;">
<img id="profilFoto" style="width:120px;border-radius:50%;">
<h3>Belinay Altın</h3>
<p>05.02.2011</p>
<input type="file" id="profilSec">
<button onclick="profilKaydet()">Kaydet</button>
</div>

<div id="icerik" class="card" style="display:none;">
<h2>Galeri 💖</h2>
<div id="galeri"></div>
<input type="file" multiple onchange="fotoEkle(event)">
</div>

<div id="lightbox">
<img id="buyukFoto">
</div>

<script>

// 🔥 PROFİL FOTO (SENİN FOTO)
let profilFoto=document.getElementById("profilFoto");
profilFoto.src="https://i.ibb.co/n8tTCLx1/1.jpg";

// 🔥 GALERİ SABİT FOTOĞRAFLAR (SİLİNMEZ)
let sabitFotolar=[
"https://i.postimg.cc/5tL9NShp/foto1.jpg",
"https://i.postimg.cc/3N8LMR3S/foto2.jpg",

"https://i.ibb.co/Pfvg7qn/1.jpg",
"https://i.ibb.co/5xJpT9pd/2.jpg",
"https://i.ibb.co/q3FsRZJW/3.jpg",
"https://i.ibb.co/1GZ09TZP/4.jpg",
"https://i.ibb.co/7tcJG5Vz/5.jpg"
];

let fotolar=[];

// 🚀 SAYFA AÇILINCA
window.onload=function(){

let kayitli=localStorage.getItem("profilFoto");
if(kayitli){
profilFoto.src=kayitli;
}else{
localStorage.setItem("profilFoto",profilFoto.src);
}

let kayitliFotolar=JSON.parse(localStorage.getItem("galeri"))||[];
fotolar=[...sabitFotolar,...kayitliFotolar];

fotolar.forEach(f=>ekranaEkle(f));
}

// 🔐 GİRİŞ
function kontrol(){
if(kullanici.value==="Belinay Altın" && sifre.value==="belinay123"){
giris.style.display="none";
icerik.style.display="block";
profilKart.style.display="block";
}else{
alert("Hatalı giriş");
}
}

// 📸 GALERİ
function ekranaEkle(src){
let img=document.createElement("img");
img.src=src;
img.onclick=()=>ac(src);
galeri.appendChild(img);
}

function fotoEkle(e){
for(let f of e.target.files){
let reader=new FileReader();
reader.onload=function(ev){
let src=ev.target.result;
fotolar.push(src);
ekranaEkle(src);

let kayit=JSON.parse(localStorage.getItem("galeri"))||[];
kayit.push(src);
localStorage.setItem("galeri",JSON.stringify(kayit));
}
reader.readAsDataURL(f);
}
}

// 🔍 BÜYÜTME
function ac(src){
buyukFoto.src=src;
lightbox.style.display="flex";
}

lightbox.onclick=()=>lightbox.style.display="none";

// 👤 PROFİL
profilSec.onchange=function(e){
let f=e.target.files[0];
let reader=new FileReader();
reader.onload=(ev)=>profilFoto.src=ev.target.result;
reader.readAsDataURL(f);
}

function profilKaydet(){
localStorage.setItem("profilFoto",profilFoto.src);
alert("Kaydedildi 💖");
}

</script>
</body>
</html>
