<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oktay's Interactive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --stress-high: #ff4b2b;
            --stress-low: #56ab2f;
            --dark-bg: #121212;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: white;
            min-height: 200vh; /* Kaydırma efekti için */
            overflow-x: hidden;
        }

        /* --- 1. FÜTÜRİSTİK CORTISOL PANELİ --- */
        #cortisol-hud {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s ease;
        }

        .meter-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary);
        }

        .meter-wrapper {
            width: 300px;
            height: 12px;
            background: #222;
            border-radius: 20px;
            border: 1px solid #444;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 5px #000;
        }

        #cortisol-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--stress-low), var(--stress-high));
            background-size: 200% 100%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Enerji Akış Animasyonu */
        #cortisol-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: scan 2s infinite linear;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* --- 2. GELECEĞE MESAJ KAPSÜLÜ --- */
        #future-capsule {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            background: var(--glass);
            border: 1px solid var(--glass);
            border-radius: 24px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h2.cyber-title {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        textarea.cyber-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-family: 'Poppins', sans-serif;
            resize: none;
            margin-top: 20px;
            transition: border 0.3s;
        }

        textarea.cyber-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .send-btn {
            margin-top: 20px;
            padding: 12px 35px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--primary);
        }

        /* --- 3. REHBER/GUIDE KARTLARI --- */
        #intro-guide {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 20px;
            z-index: 10001;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            max-width: 400px;
            display: none;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10000;
            display: none;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay"></div>

    <div id="intro-guide">
        <h3 id="guide-title">Sistem Başlatılıyor...</h3>
        <p id="guide-text">Cortisol seviyen şu an yüksek. Siteyi keşfettikçe zihnin sakinleşecek ve bu bar düşecek.</p>
        <button onclick="nextStep()" class="send-btn" style="background: #333;">Anladım</button>
    </div>

    <section id="future-capsule">
        <h2 class="cyber-title">TIME CAPSULE 2027</h2>
        <p>Gelecekteki kendine bir iz bırak. Mesajın 2027 doğum gününde açılacak.</p>
        <textarea id="user-note" class="cyber-input" rows="4" placeholder="Merhaba 2027 yılındaki ben..."></textarea>
        <button onclick="sealCapsule()" class="send-btn">Zaman Kapsülünü Mühürle</button>
    </section>

    <div id="cortisol-hud">
        <div class="meter-label">BIOMETRIC DATA: CORTISOL LEVEL</div>
        <div class="meter-wrapper">
            <div id="cortisol-bar"></div>
        </div>
        <div id="status-update" style="font-size: 0.7rem; margin-top: 5px; opacity: 0.7;">SİSTEM AKTİF - ANALİZ EDİLİYOR</div>
    </div>

    <script>
        let cortisolVal = 100;
        let guideStep = 0;

        window.onload = () => {
            // Başlangıçta rehberi göster
            document.getElementById('intro-guide').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
            updateBar();
        };

        function nextStep() {
            const title = document.getElementById('guide-title');
            const text = document.getElementById('guide-text');
            
            guideStep++;

            if(guideStep === 1) {
                title.innerText = "Zaman Yolculuğu";
                text.innerText = "Ayrıca 2027 yılındaki doğum günün için kendine özel bir mesaj bırakabilirsin.";
            } else {
                document.getElementById('intro-guide').style.display = 'none';
                document.getElementById('overlay').style.display = 'none';
                startStressReduction();
            }
        }

        function updateBar() {
            const bar = document.getElementById('cortisol-bar');
            bar.style.width = cortisolVal + "%";
            
            // Renk geçişi kontrolü
            if(cortisolVal < 40) {
                bar.style.background = "var(--stress-low)";
            } else if(cortisolVal < 70) {
                bar.style.background = "linear-gradient(90deg, #fbc2eb 0%, #a6c1ee 100%)";
            }
        }

        function startStressReduction() {
            setInterval(() => {
                if(cortisolVal > 15) {
                    cortisolVal -= Math.floor(Math.random() * 5) + 1;
                    if(cortisolVal < 15) cortisolVal = 15;
                    updateBar();
                    showMiniNotification();
                }
            }, 8000);
        }

        function showMiniNotification() {
            const status = document.getElementById('status-update');
            status.innerText = "UYARI: CORTISOL SEVİYESİ DÜŞÜYOR... RAHATLAMA ALGILANDI.";
            status.style.color = "var(--primary)";
            setTimeout(() => {
                status.innerText = "SİSTEM STABİL";
                status.style.color = "white";
            }, 3000);
        }

        function sealCapsule() {
            const note = document.getElementById('user-note').value;
            if(note) {
                alert("🔒 Kapsül Mühürlendi! 2027 doğum gününde bu mesajı tekrar göreceksin.");
                document.getElementById('user-note').value = "";
                // Buraya veri tabanı kayıt kodu gelebilir
            }
        }
    </script>
</body>
</html>
